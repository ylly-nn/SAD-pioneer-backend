basePath: /
definitions:
  admin.ApprovePartnerRequest:
    properties:
      id:
        type: string
    required:
    - id
    type: object
  admin.PartnerRequest:
    properties:
      email:
        example: ivan@example.com
        type: string
      id:
        type: string
      info:
        example: Дополнительная информация
        type: string
      inn:
        example: "123456789012"
        type: string
      kpp:
        example: "123456789"
        type: string
      name:
        example: Иван
        type: string
      ogrn:
        example: "1234567890123"
        type: string
      org_name:
        example: ООО Ромашка
        type: string
      org_short_name:
        example: Ромашка
        type: string
      patronymic:
        example: Иванович
        type: string
      phone:
        example: "9990000000"
        type: string
      status:
        example: new
        type: string
      surname:
        example: Иванов
        type: string
      user_email:
        example: email@mail.ru
        type: string
    type: object
  auth.LoginRequest:
    properties:
      email:
        example: example@gmail.com
        type: string
      password:
        example: 1A_password
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        example: example@gmail.com
        maxLength: 64
        minLength: 6
        type: string
      password:
        example: 1A_password
        maxLength: 24
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  auth.VerifyCodeRequest:
    properties:
      code:
        example: "000000"
        type: string
      email:
        example: example@gmail.com
        type: string
    required:
    - code
    - email
    type: object
  branch.BrancByCityServ:
    properties:
      address:
        example: ул. Тверская, д. 1
        type: string
      id_branch:
        example: 0bb7a20d-4ffc-46cd-b5e5-a549a179ce2a
        format: uuid
        type: string
      id_branchserv:
        example: 0bb7a20d-4ffc-46cd-b5e5-a549a179ce2a
        format: uuid
        type: string
      org_short_name:
        example: ООО Ромашка
        type: string
    type: object
  branch.ServiceDetails:
    properties:
      detail:
        example: Мойка колёс
        type: string
      duration_min:
        example: 35
        type: integer
    type: object
  client.GetCityResponse:
    properties:
      city:
        example: Москва
        type: string
    type: object
  client.UpdateCityRequest:
    properties:
      city:
        example: мОсква
        type: string
    type: object
  company.AddBranchRequest:
    properties:
      address:
        type: string
      city:
        type: string
      close_time:
        type: string
      open_time:
        type: string
    required:
    - address
    - city
    - close_time
    - open_time
    type: object
  company.AddServDetailRequest:
    properties:
      branchserv_id:
        example: 6fdd2352-ffc4-4140-b54c-67657f841c1c
        type: string
      detail:
        example: Мойка салона
        maxLength: 255
        minLength: 3
        type: string
      duration:
        example: 40
        maximum: 1439
        minimum: 1
        type: integer
      price:
        example: 700.5
        type: number
    required:
    - branchserv_id
    - detail
    - duration
    - price
    type: object
  company.AddServiceToBranch:
    properties:
      branch_id:
        example: 9eebb3b9-5b35-4007-9d4f-2f4141786b45
        type: string
      service_id:
        example: 03db1f58-2bbd-481c-8d93-b2828871b376
        type: string
    required:
    - branch_id
    - service_id
    type: object
  company.AddUserRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  company.CompanyBranch:
    properties:
      address:
        example: ул. Тверская, 1
        type: string
      branch_id:
        example: 9eebb3b9-5b35-4007-9d4f-2f4141786b45
        type: string
      city:
        example: Москва
        type: string
      close_time:
        example: 18:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
      inn_company:
        example: "123456789012"
        type: string
      open_time:
        example: 10:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
    type: object
  company.CompanyBranchOrderResponse:
    properties:
      address:
        type: string
      branch_id:
        type: string
      city:
        type: string
      orders:
        items:
          $ref: '#/definitions/company.CompanyOrder'
        type: array
    type: object
  company.CompanyBranchWithServ:
    properties:
      address:
        example: Невский пр., 10
        type: string
      city:
        example: Санкт-Петербург
        type: string
      close_time:
        example: 18:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
      open_time:
        example: 10:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
      services:
        items:
          $ref: '#/definitions/company.ServiceInBranch'
        type: array
    type: object
  company.CompanyOrder:
    properties:
      end_moment:
        example: "2026-04-16T05:20:00Z"
        type: string
      id:
        example: e77fd339-9478-4375-82c1-215936a68b8a
        type: string
      name_service:
        example: автомойка
        type: string
      orderDetails:
        items:
          $ref: '#/definitions/company.ServDetails'
        type: array
      service_by_branch:
        example: 917e77fa-1672-4dfb-8507-d5755b31ebb3
        type: string
      start_moment:
        example: "2026-04-16T05:00:00Z"
        type: string
      status:
        allOf:
        - $ref: '#/definitions/company.OrderStatus'
        example: create
      users:
        example: ex@mail.ru
        type: string
    type: object
  company.CompanyResponse:
    properties:
      inn:
        example: "234567890123"
        type: string
      kpp:
        example: "234567891"
        type: string
      ogrn:
        example: "2345678901234"
        type: string
      org_name:
        example: АО Технопром
        type: string
      org_short_name:
        example: Технопром
        type: string
    type: object
  company.OrderStatus:
    enum:
    - create
    - approve
    - reject
    type: string
    x-enum-comments:
      OrderStatusApprove: заказ подтверждён
      OrderStatusCreate: заказ создан
      OrderStatusReject: заказ отклонён
    x-enum-descriptions:
    - заказ создан
    - заказ подтверждён
    - заказ отклонён
    x-enum-varnames:
    - OrderStatusCreate
    - OrderStatusApprove
    - OrderStatusReject
  company.ServDetails:
    properties:
      detail:
        example: Мойка салона
        type: string
      duration_min:
        example: 40
        type: integer
    type: object
  company.ServUpdateResponse:
    properties:
      detail:
        example: Мойка салона
        type: string
      duration_min:
        example: 40
        type: integer
      price:
        example: 560.12
        type: number
    type: object
  company.ServiceInBranch:
    properties:
      branch_serv_id:
        example: 6fdd2352-ffc4-4140-b54c-67657f841c1c
        type: string
      service_id:
        example: 03db1f58-2bbd-481c-8d93-b2828871b376
        type: string
      service_name:
        example: мойка
        type: string
    type: object
  order.ClientOrderResponse:
    properties:
      address:
        example: ул. Тверская, д. 1
        type: string
      city:
        example: Москва
        type: string
      end_moment:
        example: "2026-03-16T11:05:00+04:00"
        format: yyyy-mm-ddThh:mm:ss+(Z)hh:mm
        type: string
      name_company:
        example: ООО "Ромашка"
        type: string
      order_details:
        type: object
      order_id:
        example: 83817fd0-ffd0-478b-b1ae-b082e8581830
        type: string
      service:
        example: Шиномонтаж
        type: string
      start_moment:
        example: "2026-03-16T09:30:00+04:00"
        format: yyyy-mm-ddThh:mm:ss+(Z)hh:mm
        type: string
      status:
        allOf:
        - $ref: '#/definitions/order.OrderStatus'
        example: create
    type: object
  order.CreateOrderRequest:
    properties:
      order_details:
        type: object
      service_by_branch:
        example: 89d74b8a-8cee-44fa-96ea-6aec1e8ad66b
        format: uuid
        type: string
      start_moment:
        example: "2026-03-16T11:20:00+04:00"
        format: yyyy-mm-ddThh-mm-ss+hh:mm
        type: string
    type: object
  order.DailySlots:
    properties:
      date:
        example: "2026-03-16T00:00:00Z"
        format: yyyy-mm-ddT00:00:00Z
        type: string
      intervals:
        example:
        - '[2026-03-17T10:35:00+04:00'
        - ' 2026-03-17T10:50:00+04:00'
        - ' 2026-03-17T11:05:00+04:00]'
        items:
          type: string
        type: array
    type: object
  order.Order:
    properties:
      end_moment:
        example: "2026-04-16T05:20:00Z"
        type: string
      id:
        example: e77fd339-9478-4375-82c1-215936a68b8a
        type: string
      order_details:
        type: object
      service_by_branch:
        example: 917e77fa-1672-4dfb-8507-d5755b31ebb3
        type: string
      start_moment:
        example: "2026-04-16T05:00:00Z"
        type: string
      status:
        allOf:
        - $ref: '#/definitions/order.OrderStatus'
        example: create
      users:
        example: ex@mail.ru
        type: string
    type: object
  order.OrderStatus:
    enum:
    - create
    - approve
    - reject
    type: string
    x-enum-comments:
      OrderStatusApprove: заказ подтверждён
      OrderStatusCreate: заказ создан
      OrderStatusReject: заказ отклонён
    x-enum-descriptions:
    - заказ создан
    - заказ подтверждён
    - заказ отклонён
    x-enum-varnames:
    - OrderStatusCreate
    - OrderStatusApprove
    - OrderStatusReject
  partners.PartnerRequestRequest:
    properties:
      email:
        example: ivan@example.com
        type: string
      info:
        example: Дополнительная информация
        type: string
      inn:
        example: "123456789012"
        type: string
      kpp:
        example: "123456789"
        type: string
      name:
        example: Иван
        type: string
      ogrn:
        example: "1234567890123"
        type: string
      org_name:
        example: ООО Ромашка
        type: string
      org_short_name:
        example: Ромашка
        type: string
      patronymic:
        example: Иванович
        type: string
      phone:
        example: "9871111111"
        type: string
      status:
        type: string
      surname:
        example: Иванов
        type: string
    type: object
  service.ServiceResponse:
    properties:
      id:
        example: 83817fd0-ffd0-478b-b1ae-b082e8581830
        format: uuid
        type: string
      name:
        example: Aвтомойка
        type: string
    type: object
  swagger.AddBranchResponse:
    properties:
      address:
        example: ул. Тверская, 1
        type: string
      city:
        example: Москва
        type: string
      close_time:
        example: 18:00:00+00:00
        type: string
      message:
        example: Branch added to company successfully
        type: string
      open_time:
        example: 10:00:00+00:00
        type: string
    type: object
  swagger.AddUserResponse:
    properties:
      email:
        example: newuser@example.com
        type: string
      message:
        example: User added to company successfully
        type: string
    type: object
  swagger.LogoutRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  swagger.LogoutResponse:
    properties:
      message:
        example: Successfully logged out
        type: string
    type: object
  swagger.RegisterResponse:
    properties:
      email:
        example: user@example.com
        type: string
      message:
        example: Verification code sent to email
        type: string
    type: object
  swagger.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    type: object
  swagger.VerifyCodeResponse:
    properties:
      message:
        example: User successfully registered
        type: string
    type: object
info:
  contact: {}
  description: API для сервиса  Pioneer.
  title: Pioneer API
paths:
  /admin/partner-requests/:
    get:
      consumes:
      - application/json
      description: Возвращает список всех заявок на регистрацию организаций. Доступно
        только для администраторов.
      produces:
      - application/json
      responses:
        "200":
          description: Список заявок (если нет, возвращается null)
          schema:
            items:
              $ref: '#/definitions/admin.PartnerRequest'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Failed to get requests
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить все заявки партнёров
      tags:
      - admin
  /admin/partner-requests/approve:
    post:
      consumes:
      - application/json
      description: Администратор одобряет заявку (статус "pending" -> "approved").
        Создаётся компания и связывается с пользователем.
      parameters:
      - description: INN организации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.ApprovePartnerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: Partner request approved'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body | validation error | request with inn
            ... not found | request already processed | failed to create company |
            failed to create partner user record | failed to update request status
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Одобрить заявку партнёра
      tags:
      - admin
  /admin/partner-requests/approved:
    get:
      consumes:
      - application/json
      description: Возвращает список заявок со статусом "approved" (принятые). Доступно
        только для администраторов.
      produces:
      - application/json
      responses:
        "200":
          description: Список принятых заявок (если нет, возвращается null
          schema:
            items:
              $ref: '#/definitions/admin.PartnerRequest'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Failed to get requests
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить принятые заявки партнёров
      tags:
      - admin
  /admin/partner-requests/new:
    get:
      consumes:
      - application/json
      description: Возвращает список заявок со статусом "new". Доступно только для
        администраторов.
      produces:
      - application/json
      responses:
        "200":
          description: Список новых заявок (если нет, возвращается null)
          schema:
            items:
              $ref: '#/definitions/admin.PartnerRequest'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Failed to get requests
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить новые заявки партнёров
      tags:
      - admin
  /admin/partner-requests/pending:
    get:
      consumes:
      - application/json
      description: Возвращает список заявок со статусом "pending" (в работе). Доступно
        только для администраторов.
      produces:
      - application/json
      responses:
        "200":
          description: Список заявок в работе (если нет, возвращается null)
          schema:
            items:
              $ref: '#/definitions/admin.PartnerRequest'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Failed to get requests
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить заявки в работе
      tags:
      - admin
  /admin/partner-requests/reject:
    post:
      consumes:
      - application/json
      description: Администратор отклоняет заявку (статус "pending" -> "rejected").
        Требуется указать INN организации.
      parameters:
      - description: INN организации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.ApprovePartnerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: Request rejected, inn: ..., status: rejected'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 'Invalid request body | validation error | request with inn
            ... not found | request cannot be rejected: current status is ...'
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Отклонить заявку партнёра
      tags:
      - admin
  /admin/partner-requests/rejected:
    get:
      consumes:
      - application/json
      description: Возвращает список заявок со статусом "rejected" (отклонённые).
        Доступно только для администраторов.
      produces:
      - application/json
      responses:
        "200":
          description: Список отклонённых заявок (если нет, возвращается null)
          schema:
            items:
              $ref: '#/definitions/admin.PartnerRequest'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Failed to get requests
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить отклонённые заявки партнёров
      tags:
      - admin
  /admin/partner-requests/take:
    post:
      consumes:
      - application/json
      description: Администратор переводит заявку из статуса "new" в "pending". Требуется
        указать INN организации.
      parameters:
      - description: INN организации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.ApprovePartnerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: Request taken to work, inn: ..., status: pending'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 'Invalid request body | validation error | request with inn
            ... not found | request cannot be taken to work: current status is ...'
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "403":
          description: 'Forbidden: admin access required'
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Взять заявку в работу
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Аутентифицирует пользователя по email и паролю, возвращает access
        и refresh токены
      parameters:
      - description: Учётные данные пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Токены доступа и обновления
          schema:
            $ref: '#/definitions/swagger.TokenResponse'
        "400":
          description: Invalid request body or missing email/password
          schema:
            type: string
        "401":
          description: Invalid credentials
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Вход пользователя
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Инвалидирует refresh token, завершая сессию пользователя.
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/swagger.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный выход
          schema:
            $ref: '#/definitions/swagger.LogoutResponse'
        "400":
          description: Invalid request body or refresh token is required
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Выход пользователя
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Принимает refresh токен и выдаёт новую пару access/refresh токенов.
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Новые токены
          schema:
            $ref: '#/definitions/auth.TokenResponse'
        "400":
          description: Invalid request body or missing refresh token
          schema:
            type: string
        "401":
          description: Invalid or expired refresh token
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Обновление токенов доступа
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и отправляет код подтверждения на email
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Сообщение об отправке кода и email пользователя
          schema:
            $ref: '#/definitions/swagger.RegisterResponse'
        "400":
          description: Invalid request body, missing fields, or validation error
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "409":
          description: user already exists
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Регистрация нового пользователя
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Проверяет код подтверждения, отправленный на email, и завершает
        регистрацию пользователя
      parameters:
      - description: Email и код подтверждения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyCodeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Сообщение об успешной регистрации
          schema:
            $ref: '#/definitions/swagger.VerifyCodeResponse'
        "400":
          description: Invalid request body, missing email/code, invalid code, or
            code expired
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Подтверждение регистрации по коду
      tags:
      - auth
  /branch:
    get:
      description: Получить филиал для определённого города с определённым сервисом
      parameters:
      - description: Город
        in: query
        name: city
        required: true
        type: string
      - description: ID Сервиса
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/branch.BrancByCityServ'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить филиал для заказа
      tags:
      - branch
  /branch/freetime:
    get:
      description: Возвращает доступное время записи в определёный филиал с учётом
        общей длительности услуги на неделю
      parameters:
      - description: ID Филиала
        in: query
        name: branch_id
        required: true
        type: string
      - description: Дата начала недели формат yyyy-mm-dd
        in: query
        name: date
        required: true
        type: string
      - description: Общая длительность услуги в минутах
        in: query
        name: duration
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.DailySlots'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить доступное время для записи
      tags:
      - branch
  /branch/service/details/{id_branchserv}:
    get:
      description: Получение состава услуги по id branchserv для авторизованных пользователей
      parameters:
      - description: branchserv ID
        in: path
        name: id_branchserv
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/branch.ServiceDetails'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить состав услуги
      tags:
      - branch
  /client/city:
    get:
      description: Возвращает город авторизованного клиента
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.GetCityResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить город клиента
      tags:
      - client
    put:
      description: Обновляет город клиента, если тот есть в списке городов (в любом
        регистре)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.UpdateCityRequest'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Обновить город клиента
      tags:
      - client
  /client/orders:
    get:
      description: Возвращает все заказы, принадлежащие авторизованному клиенту.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.ClientOrderResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить заказы клиента
      tags:
      - client
  /company:
    get:
      consumes:
      - application/json
      description: Возвращает данные компании для авторизованного пользователя (только
        для партнёров).
      produces:
      - application/json
      responses:
        "200":
          description: Данные компании
          schema:
            $ref: '#/definitions/company.CompanyResponse'
        "401":
          description: 'Unauthorized: missing or invalid token'
          schema:
            type: string
        "403":
          description: User does not have a company
          schema:
            type: string
        "404":
          description: Company not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить компанию пользователя
      tags:
      - company
  /company/branch:
    post:
      consumes:
      - application/json
      description: Позволяет партнёру добавить новый филиал в свою компанию. Город
        должен быть из списка допустимых (нормализуется автоматически), адрес уникален
        для компании.
      parameters:
      - description: Данные нового филиала
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/company.AddBranchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Филиал успешно добавлен
          schema:
            $ref: '#/definitions/swagger.AddBranchResponse'
        "400":
          description: Invalid request body | validation error | empty city | invalid
            city | branch with this address already exists for this company
          schema:
            type: string
        "401":
          description: 'Unauthorized | Invalid token: email not found'
          schema:
            type: string
        "403":
          description: User does not have a company
          schema:
            type: string
        "404":
          description: Company not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Добавить филиал компании
      tags:
      - company
  /company/branch/service:
    post:
      consumes:
      - application/json
      description: Позволяет партнёру добавить существующую услугу (по ID) в указанный
        филиал своей компании.
      parameters:
      - description: Данные для добавления услуги в филиал
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/company.AddServiceToBranch'
      produces:
      - application/json
      responses:
        "201":
          description: 'message: Service added to branch successfully, branch_id:
            ..., service_id: ...'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body | validation error | service already exists
            in this branch
          schema:
            type: string
        "401":
          description: 'Unauthorized | Invalid token: email not found'
          schema:
            type: string
        "403":
          description: User does not have a company | User does not have access to
            the branch
          schema:
            type: string
        "404":
          description: Company not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Добавить услугу в филиал
      tags:
      - company
  /company/branch/service/{branchServID}:
    get:
      consumes:
      - application/json
      description: Возвращает описание и длительность услуги, связанной с указанным
        идентификатором услуги филиала (branch_serv_id).
      parameters:
      - description: UUID записи услуги филиала
        example: 6fdd2352-ffc4-4140-b54c-67657f841c1c
        in: path
        name: branchServID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Детали услуги (если данные отсутствуют, возвращается null)
          schema:
            $ref: '#/definitions/company.ServDetails'
        "400":
          description: invalid branch service ID или invalid service details format
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims или email not found in token'
          schema:
            type: string
        "403":
          description: user is not a partner или branch service not available
          schema:
            type: string
        "500":
          description: internal server error или failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить детали услуги филиала
      tags:
      - company
  /company/branch/service/detail:
    post:
      consumes:
      - application/json
      description: Позволяет партнёру добавить новую деталь (например, "Мойка салона")
        с длительностью к существующей услуге филиала.
      parameters:
      - description: Деталь для добавления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/company.AddServDetailRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Обновлённый список деталей услуги
          schema:
            items:
              $ref: '#/definitions/company.ServUpdateResponse'
            type: array
        "400":
          description: invalid request body | validation error | invalid duration
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims | email not found in token'
          schema:
            type: string
        "403":
          description: user is not a partner | branch service not available
          schema:
            type: string
        "409":
          description: detail for this service in the branch already exists
          schema:
            type: string
        "500":
          description: internal server error | failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Добавить деталь услуги филиала
      tags:
      - company
  /company/branch/service/detail/{branchServID}:
    delete:
      consumes:
      - application/json
      description: Позволяет партнёру удалить существующую деталь (например, "Мойка
        салона") из услуги филиала.
      parameters:
      - description: UUID записи услуги филиала
        example: 6fdd2352-ffc4-4140-b54c-67657f841c1c
        in: path
        name: branchServID
        required: true
        type: string
      - description: Название детали для удаления
        example: Мойка салона
        in: query
        name: detail
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Обновлённый список деталей услуги
          schema:
            items:
              $ref: '#/definitions/company.ServUpdateResponse'
            type: array
        "400":
          description: 'missing branchServID parameter | invalid branch service ID
            format: must be UUID | missing detail parameter'
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims | email not found in token'
          schema:
            type: string
        "403":
          description: user is not a partner | branch service not available
          schema:
            type: string
        "404":
          description: detail not found
          schema:
            type: string
        "500":
          description: internal server error | failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Удалить деталь услуги филиала
      tags:
      - company
  /company/branches:
    get:
      consumes:
      - application/json
      description: Возвращает список филиалов компании, к которой привязан авторизованный
        пользователь (только для партнёров).
      produces:
      - application/json
      responses:
        "200":
          description: Список филиалов (если нет филиалов, возвращается null)
          schema:
            items:
              $ref: '#/definitions/company.CompanyBranch'
            type: array
        "401":
          description: 'Unauthorized: missing or invalid token'
          schema:
            type: string
        "403":
          description: User does not have a company
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить филиалы компании
      tags:
      - company
  /company/branches/{branch_id}:
    get:
      consumes:
      - application/json
      description: Возвращает детальную информацию о филиале компании текущего пользователя,
        включая список услуг.
      parameters:
      - description: UUID филиала
        example: 9eebb3b9-5b35-4007-9d4f-2f4141786b45
        in: path
        name: branch_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Филиал с услугами (если не найден, возвращается null)
          schema:
            $ref: '#/definitions/company.CompanyBranchWithServ'
        "400":
          description: 'missing branch id или invalid branch id format: must be UUID'
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims или email not found in token'
          schema:
            type: string
        "403":
          description: User does not have a company или User does not have access
            to the branch
          schema:
            type: string
        "500":
          description: internal server error или failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить филиал компании по ID
      tags:
      - company
  /company/order/status:
    put:
      consumes:
      - application/json
      description: Позволяет партнёру подтвердить (approve) или отклонить (reject)
        заказ, связанный с его компанией. Доступно только для авторизованных партнёров.
      parameters:
      - description: UUID заказа
        example: e77fd339-9478-4375-82c1-215936a68b8a
        in: query
        name: orderID
        required: true
        type: string
      - description: 'Новый статус: approve или reject'
        example: approve
        in: query
        name: status
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Обновлённый заказ
          schema:
            $ref: '#/definitions/company.CompanyOrder'
        "400":
          description: 'missing orderID parameter | missing status parameter | invalid
            orderID format: must be UUID | invalid status parameter'
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims | email not found in token'
          schema:
            type: string
        "403":
          description: user is not a partner | order not available
          schema:
            type: string
        "500":
          description: internal server error | failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Обновить статус заказа
      tags:
      - company
  /company/orders:
    get:
      consumes:
      - application/json
      description: Возвращает список заказов компании, сгруппированных по филиалам.
        Доступно только для партнёров.
      produces:
      - application/json
      responses:
        "200":
          description: Список филиалов с заказами (если данных нет, возвращается null)
          schema:
            items:
              $ref: '#/definitions/company.CompanyBranchOrderResponse'
            type: array
        "401":
          description: 'unauthorized: missing user claims или email not found in token'
          schema:
            type: string
        "403":
          description: user is not a partner
          schema:
            type: string
        "500":
          description: internal server error или failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить заказы компании
      tags:
      - company
  /company/users:
    post:
      consumes:
      - application/json
      description: Позволяет партнёру добавить нового пользователя в свою компанию.
        Новый пользователь должен существовать в системе и ещё не быть партнёром.
      parameters:
      - description: Email нового пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/company.AddUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Пользователь успешно добавлен
          schema:
            $ref: '#/definitions/swagger.AddUserResponse'
        "400":
          description: Invalid request body | validation error | user not found |
            user is already a partner
          schema:
            type: string
        "401":
          description: 'Unauthorized | Invalid token: email not found'
          schema:
            type: string
        "403":
          description: User does not have a company
          schema:
            type: string
        "404":
          description: Company not found
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Добавить пользователя в компанию
      tags:
      - company
  /order:
    post:
      consumes:
      - application/json
      description: Создаёт новый заказ для авторизованного клиента на доступное время.
      parameters:
      - description: Данные для создания заказа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/order.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/order.Order'
        "400":
          description: Invalid request body or business logic error
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создать заказ
      tags:
      - order
  /partner/request:
    get:
      consumes:
      - application/json
      description: Возвращает статус заявки на регистрацию организации для текущего
        авторизованного пользователя.
      produces:
      - application/json
      responses:
        "200":
          description: Статус заявки
          schema:
            $ref: '#/definitions/partners.PartnerRequestRequest'
        "401":
          description: 'Unauthorized | Invalid token: email not found'
          schema:
            type: string
        "404":
          description: 'no request found for user: <email>'
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить статус заявки партнёра
      tags:
      - partners
    post:
      consumes:
      - application/json
      description: Позволяет авторизованному пользователю подать заявку на регистрацию
        организации. Проверяет, что компания с таким ИНН ещё не существует в системе.
      parameters:
      - description: Данные заявки
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/partners.PartnerRequestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'message: Partner request created successfully'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body | validation error | user not found |
            company with this INN already exists
          schema:
            type: string
        "401":
          description: 'Unauthorized | Invalid token: email not found'
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создать заявку партнёра
      tags:
      - partners
  /services:
    get:
      description: Возвращает список общих услуг и их ID
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.ServiceResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить список услуг
      tags:
      - services
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
