basePath: /
definitions:
  auth.LoginRequest:
    properties:
      email:
        example: example@gmail.com
        type: string
      password:
        example: 1A_password
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        example: example@gmail.com
        maxLength: 64
        minLength: 6
        type: string
      password:
        example: 1A_password
        maxLength: 24
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        example: Bearer
        type: string
    type: object
  auth.VerifyCodeRequest:
    properties:
      code:
        example: "000000"
        type: string
      email:
        example: example@gmail.com
        type: string
    required:
    - code
    - email
    type: object
  branch.BrancByCityServ:
    properties:
      address:
        example: ул. Тверская, д. 1
        type: string
      id_branch:
        example: 0bb7a20d-4ffc-46cd-b5e5-a549a179ce2a
        format: uuid
        type: string
      id_branchserv:
        example: 0bb7a20d-4ffc-46cd-b5e5-a549a179ce2a
        format: uuid
        type: string
      org_short_name:
        example: ООО Ромашка
        type: string
    type: object
  branch.ServiceDetails:
    properties:
      detail:
        example: Мойка колёс
        type: string
      duration_min:
        example: 35
        type: integer
    type: object
  client.GetCityResponse:
    properties:
      city:
        example: Москва
        type: string
    type: object
  client.UpdateCityRequest:
    properties:
      city:
        example: мОсква
        type: string
    type: object
  company.CompanyBranch:
    properties:
      address:
        example: ул. Тверская, 1
        type: string
      branch_id:
        example: 9eebb3b9-5b35-4007-9d4f-2f4141786b45
        type: string
      city:
        example: Москва
        type: string
      close_time:
        example: 18:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
      inn_company:
        example: "123456789012"
        type: string
      open_time:
        example: 10:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
    type: object
  company.CompanyBranchWithServ:
    properties:
      address:
        example: Невский пр., 10
        type: string
      city:
        example: Санкт-Петербург
        type: string
      close_time:
        example: 18:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
      open_time:
        example: 10:00:00+00:00
        format: hh:mm:ss+hh:mm
        type: string
      services:
        items:
          $ref: '#/definitions/company.ServiceInBranch'
        type: array
    type: object
  company.CompanyResponse:
    properties:
      inn:
        example: "234567890123"
        type: string
      kpp:
        example: "234567891"
        type: string
      ogrn:
        example: "2345678901234"
        type: string
      org_name:
        example: АО Технопром
        type: string
      org_short_name:
        example: Технопром
        type: string
    type: object
  company.CompanyServDetailsResponse:
    properties:
      detail:
        example: Мойка салона
        type: string
      duration_min:
        example: 40
        type: integer
    type: object
  company.ServiceInBranch:
    properties:
      branch_serv_id:
        example: 6fdd2352-ffc4-4140-b54c-67657f841c1c
        type: string
      service_id:
        example: 03db1f58-2bbd-481c-8d93-b2828871b376
        type: string
      service_name:
        example: мойка
        type: string
    type: object
  order.ClientOrderResponse:
    properties:
      address:
        example: ул. Тверская, д. 1
        type: string
      city:
        example: Москва
        type: string
      end_moment:
        example: "2026-03-16T11:05:00+04:00"
        format: yyyy-mm-ddThh:mm:ss+(Z)hh:mm
        type: string
      name_company:
        example: ООО "Ромашка"
        type: string
      order_details:
        type: object
      order_id:
        example: 83817fd0-ffd0-478b-b1ae-b082e8581830
        type: string
      service:
        example: Шиномонтаж
        type: string
      start_moment:
        example: "2026-03-16T09:30:00+04:00"
        format: yyyy-mm-ddThh:mm:ss+(Z)hh:mm
        type: string
    type: object
  order.CreateOrderRequest:
    properties:
      order_details:
        type: object
      service_by_branch:
        example: 89d74b8a-8cee-44fa-96ea-6aec1e8ad66b
        format: uuid
        type: string
      start_moment:
        example: "2026-03-16T11:20:00+04:00"
        format: yyyy-mm-ddThh-mm-ss+hh:mm
        type: string
    type: object
  order.DailySlots:
    properties:
      date:
        example: "2026-03-16T00:00:00Z"
        format: yyyy-mm-ddT00:00:00Z
        type: string
      intervals:
        example:
        - '[2026-03-17T10:35:00+04:00'
        - ' 2026-03-17T10:50:00+04:00'
        - ' 2026-03-17T11:05:00+04:00]'
        items:
          type: string
        type: array
    type: object
  order.Order:
    properties:
      end_moment:
        example: "2026-04-16T05:20:00Z"
        type: string
      id:
        example: e77fd339-9478-4375-82c1-215936a68b8a
        type: string
      order_details:
        type: object
      service_by_branch:
        example: 917e77fa-1672-4dfb-8507-d5755b31ebb3
        type: string
      start_moment:
        example: "2026-04-16T05:00:00Z"
        type: string
      users:
        example: ex@mail.ru
        type: string
    type: object
  service.ServiceResponse:
    properties:
      id:
        example: 83817fd0-ffd0-478b-b1ae-b082e8581830
        format: uuid
        type: string
      name:
        example: Aвтомойка
        type: string
    type: object
  swagger.LogoutRequest:
    properties:
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  swagger.LogoutResponse:
    properties:
      message:
        example: Successfully logged out
        type: string
    type: object
  swagger.RegisterResponse:
    properties:
      email:
        example: user@example.com
        type: string
      message:
        example: Verification code sent to email
        type: string
    type: object
  swagger.TokenResponse:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    type: object
  swagger.VerifyCodeResponse:
    properties:
      message:
        example: User successfully registered
        type: string
    type: object
info:
  contact: {}
  description: API для сервиса  Pioneer.
  title: Pioneer API
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Аутентифицирует пользователя по email и паролю, возвращает access
        и refresh токены
      parameters:
      - description: Учётные данные пользователя
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Токены доступа и обновления
          schema:
            $ref: '#/definitions/swagger.TokenResponse'
        "400":
          description: Invalid request body or missing email/password
          schema:
            type: string
        "401":
          description: Invalid credentials
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Вход пользователя
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Инвалидирует refresh token, завершая сессию пользователя.
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/swagger.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный выход
          schema:
            $ref: '#/definitions/swagger.LogoutResponse'
        "400":
          description: Invalid request body or refresh token is required
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Выход пользователя
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Принимает refresh токен и выдаёт новую пару access/refresh токенов.
      parameters:
      - description: Refresh токен
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Новые токены
          schema:
            $ref: '#/definitions/auth.TokenResponse'
        "400":
          description: Invalid request body or missing refresh token
          schema:
            type: string
        "401":
          description: Invalid or expired refresh token
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Обновление токенов доступа
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Создаёт нового пользователя и отправляет код подтверждения на email
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Сообщение об отправке кода и email пользователя
          schema:
            $ref: '#/definitions/swagger.RegisterResponse'
        "400":
          description: Invalid request body, missing fields, or validation error
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "409":
          description: user already exists
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Регистрация нового пользователя
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Проверяет код подтверждения, отправленный на email, и завершает
        регистрацию пользователя
      parameters:
      - description: Email и код подтверждения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyCodeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Сообщение об успешной регистрации
          schema:
            $ref: '#/definitions/swagger.VerifyCodeResponse'
        "400":
          description: Invalid request body, missing email/code, invalid code, or
            code expired
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Подтверждение регистрации по коду
      tags:
      - auth
  /branch:
    get:
      description: Получить филиал для определённого города с определённым сервисом
      parameters:
      - description: Город
        in: query
        name: city
        required: true
        type: string
      - description: ID Сервиса
        in: query
        name: service
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/branch.BrancByCityServ'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить филиал для заказа
      tags:
      - branch
  /branch/freetime:
    get:
      description: Возвращает доступное время записи в определёный филиал с учётом
        общей длительности услуги на неделю
      parameters:
      - description: ID Филиала
        in: query
        name: branch_id
        required: true
        type: string
      - description: Дата начала недели формат yyyy-mm-dd
        in: query
        name: date
        required: true
        type: string
      - description: Общая длительность услуги в минутах
        in: query
        name: duration
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.DailySlots'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить доступное время для записи
      tags:
      - branch
  /branch/service/details/{id_branchserv}:
    get:
      description: Получение состава услуги по id branchserv для авторизованных пользователей
      parameters:
      - description: branchserv ID
        in: path
        name: id_branchserv
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/branch.ServiceDetails'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить состав услуги
      tags:
      - branch
  /client/city:
    get:
      description: Возвращает город авторизованного клиента
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.GetCityResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить город клиента
      tags:
      - client
    put:
      description: Обновляет город клиента, если тот есть в списке городов (в любом
        регистре)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/client.UpdateCityRequest'
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Обновить город клиента
      tags:
      - client
  /client/orders:
    get:
      description: Возвращает все заказы, принадлежащие авторизованному клиенту.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/order.ClientOrderResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить заказы клиента
      tags:
      - client
  /company:
    get:
      consumes:
      - application/json
      description: Возвращает данные компании для авторизованного пользователя (только
        для партнёров).
      produces:
      - application/json
      responses:
        "200":
          description: Данные компании
          schema:
            $ref: '#/definitions/company.CompanyResponse'
        "401":
          description: 'Unauthorized: missing or invalid token'
          schema:
            type: string
        "403":
          description: User does not have a company
          schema:
            type: string
        "404":
          description: Company not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить компанию пользователя
      tags:
      - company
  /company/branch/service/{branchServID}:
    get:
      consumes:
      - application/json
      description: Возвращает описание и длительность услуги, связанной с указанным
        идентификатором услуги филиала (branch_serv_id).
      parameters:
      - description: UUID записи услуги филиала
        example: 6fdd2352-ffc4-4140-b54c-67657f841c1c
        in: path
        name: branchServID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Детали услуги (если данные отсутствуют, возвращается null)
          schema:
            $ref: '#/definitions/company.CompanyServDetailsResponse'
        "400":
          description: invalid branch service ID или invalid service details format
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims или email not found in token'
          schema:
            type: string
        "403":
          description: user is not a partner или branch service not available
          schema:
            type: string
        "500":
          description: internal server error или failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить детали услуги филиала
      tags:
      - company
  /company/branches:
    get:
      consumes:
      - application/json
      description: Возвращает список филиалов компании, к которой привязан авторизованный
        пользователь (только для партнёров).
      produces:
      - application/json
      responses:
        "200":
          description: Список филиалов (если нет филиалов, возвращается null)
          schema:
            items:
              $ref: '#/definitions/company.CompanyBranch'
            type: array
        "401":
          description: 'Unauthorized: missing or invalid token'
          schema:
            type: string
        "403":
          description: User does not have a company
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить филиалы компании
      tags:
      - company
  /company/branches/{branch_id}:
    get:
      consumes:
      - application/json
      description: Возвращает детальную информацию о филиале компании текущего пользователя,
        включая список услуг.
      parameters:
      - description: UUID филиала
        example: 9eebb3b9-5b35-4007-9d4f-2f4141786b45
        in: path
        name: branch_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Филиал с услугами (если не найден, возвращается null)
          schema:
            $ref: '#/definitions/company.CompanyBranchWithServ'
        "400":
          description: 'missing branch id или invalid branch id format: must be UUID'
          schema:
            type: string
        "401":
          description: 'unauthorized: missing user claims или email not found in token'
          schema:
            type: string
        "403":
          description: User does not have a company или User does not have access
            to the branch
          schema:
            type: string
        "500":
          description: internal server error или failed to encode response
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить филиал компании по ID
      tags:
      - company
  /order:
    post:
      consumes:
      - application/json
      description: Создаёт новый заказ для авторизованного клиента на доступное время.
      parameters:
      - description: Данные для создания заказа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/order.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/order.Order'
        "400":
          description: Invalid request body or business logic error
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Создать заказ
      tags:
      - order
  /services:
    get:
      description: Возвращает список общих услуг и их ID
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.ServiceResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Получить список услуг
      tags:
      - services
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
